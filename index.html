<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="keywords"
        content="layicr,lyc,lyc.la,演唱会,五月天,陈奕迅,任贤齐,孙燕姿,邓紫棋,周传雄,李荣浩,伍佰,Concert,Mayday,EasonChan,RichieJen,StefanieSun,G.E.M.,SteveChou,LiRonghao,WuBai,演唱会足迹,演唱会记录">
    <meta name="description"
        content="Layicr的个人演唱会足迹记录网站。记录观看伍佰、李荣浩、邓紫棋、周传雄、五月天、陈奕迅等歌手演唱会的美好回忆。">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="layicr">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="http://ilive.lyc.la">
    
    <!-- 安全和隐私策略 -->
    <meta http-equiv="Content-Security-Policy" 
          content="default-src 'self'; 
                   script-src 'self' https://cdnjs.cloudflare.com https://cdn.tailwindcss.com 'unsafe-inline'; 
                   style-src 'self' https://cdnjs.cloudflare.com https://cdn.tailwindcss.com 'unsafe-inline'; 
                   img-src 'self' data: https:; 
                   media-src 'self'; 
                   font-src 'self' https://cdnjs.cloudflare.com; 
                   connect-src 'self' https://cdn.busuanzi.cc;">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="http://ilive.lyc.la">
    <meta property="og:title" content="Layicr 演唱会足迹">
    <meta property="og:description" content="记录每一次演唱会的感动与回忆">
    <meta property="og:image" content="http://ilive.lyc.la/img/logo.jpg">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="http://ilive.lyc.la">
    <meta property="twitter:title" content="Layicr 演唱会足迹">
    <meta property="twitter:description" content="记录每一次演唱会的感动与回忆">
    <meta property="twitter:image" content="http://ilive.lyc.la/img/logo.jpg">
    
    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="img/logo.jpg">
    <link rel="apple-touch-icon" href="img/logo.jpg">
    
    <!-- DNS预获取和预连接 -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="dns-prefetch" href="https://cdn.busuanzi.cc">
    <link rel="dns-prefetch" href="https://cdn.tailwindcss.com">
    
    <title>layicr - 演唱会足迹</title>
    
<script>
var _hmt = _hmt || [];
(function() {
  var hm = document.createElement("script");
  hm.src = "https://hm.baidu.com/hm.js?42b5be525bcdfd426e00fd02232400f6";

  s.parentNode.insertBefore(hm, s);
})();
</script>

    <!-- 关键CSS内联 -->
    <link rel="stylesheet" type="text/css" href="css/load.css" />

    
    <!-- 引入GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"
        integrity="sha512-16esztaSRplJROstbIIdwX3N97V1+pZvV33ABoG1H2OyTttBxEGkTsoIVsiP1iaTtM8b3+hu2kB6pQ4Clr5yug=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
    <link rel="stylesheet" type="text/css" href="css/main.css" />
    
    <!-- 非关键CSS延迟加载 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" 
          media="print" onload="this.media='all'">
    

    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- JSON-LD 结构化数据 -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "layicr",
        "url": "http://ilive.lyc.la",
        "description": "Layicr的个人演唱会足迹记录网站",
        "sameAs": [
            "https://github.com/layicr",
            "https://weibo.com/layicr",
            "https://twitter.com/layicr",
            "https://www.instagram.com/ilayicr"
        ],
        "worksFor": {
            "@type": "Organization",
            "name": "Concert Journey"
        }
    }
    </script>
</head>

<body>
    <!-- 骨架屏 -->
    <div id="skeleton-loader" class="skeleton-container">
        <div class="skeleton-content">
            <img src="img/logo.jpg" alt="logo" class="skeleton-avatar">
            <div class="skeleton-card">
                <div class="scramble-line" data-text="自由摄影 / 纯粹为镜"></div>
                <div class="scramble-line" data-text="Liberated Photography / Purity as the Lens"></div>
                <div class="scramble-line" data-text="行者旅人 / 探索为途"></div>
                <div class="scramble-line" data-text="Nomad on a Journey / Exploration as the Path"></div>
            </div>
        </div>
    </div>

    <div class="language-switcher" role="group" aria-label="语言选择">
        <button class="lang-btn active" data-lang="zh" aria-label="切换到中文">中文</button>
        <button class="lang-btn" data-lang="en" aria-label="切换到英文">EN</button>
    </div>
    <div class="music-player">
        <button class="music-btn" id="musicToggle" title="Play/Pause music" aria-label="播放/暂停背景音乐">
            <i class="fas fa-music" id="musicIcon" aria-hidden="true"></i>
        </button>
        <span class="music-wave" id="musicWave" aria-hidden="true">
            <span></span><span></span><span></span><span></span>
        </span>
    </div>
    <audio id="bgMusic" loop>
        <source id="bgMusicSource" src="music/bgm_cn.mp3" type="audio/mpeg">
    </audio>

    <div class="background-circles">
        <div class="logo-letter">L</div>
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <section class="hero-section">
        <div class="profile-wrapper">
            <div class="orbit-container">
                <div class="avatar-section">
                    <div class="avatar-container">
                        <img src="img/logo.jpg" alt="layicr" class="avatar-image" onerror="this.src='img/logo.jpg'">
                        <div class="status-dot"></div>
                    </div>
                    <div class="avatar-border"></div>
                </div>
            </div>

            <div class="profile-card">
                <div class="profile-label" id="profile-label">My name is:</div>
                <h1 class="profile-name">layicr</h1>

                <div class="profile-subtitle" id="profile-subtitle">Loading...</div>
                <ul class="roles-list" id="roles-list">
                    <li class="role-item">Loading...</li>
                    <li class="role-item">Loading...</li>
                </ul>
            </div>
        </div>
    </section>

    <!-- Stories Section -->
    <section class="section-spacing">
        <!-- 文字介绍区域 -->
        <div class="max-w-4xl mx-auto px-6 mb-16">
            <p class="text-2xl md:text-3xl text-gray-400 leading-relaxed max-w-3xl">
                <span id="dynamic-text-1"></span><br />
                <span id="dynamic-text-2"></span><br />
                <span id="dynamic-text" class="highlight-fill"></span>
            </p>
        </div>
    </section>

    <!-- Social Media Stats Section -->
    <section class="social-stats" id="influencer">

        <div class="stats-grid">
            <div class="stat-card cities" id="city-card">
                <div class="stat-number" id="total-cities">Loading...</div>
                <div class="stat-label" id="cities-label">城市</div>
            </div>

            <div class="stat-card artists">
                <div class="stat-number" id="total-artists">Loading...</div>
                <div class="stat-label" id="artists-label">艺人</div>
            </div>

            <div class="stat-card total">
                <div class="stat-number" id="total-concerts">Loading...</div>
                <div class="stat-label" id="total-label">场次</div>
            </div>
        </div>
    </section>

    <!-- 3D专辑展示区域 -->
    <div class="album-showcase-container">
        <!-- 左侧：专辑堆叠 -->
        <div class="album-stack-container">
            <div class="album-stack" id="albumStack">
                <!-- 专辑卡片将通过JS动态生成 -->
            </div>
        </div>

        <!-- 右侧：详情面板 -->
        <div class="detail-panel">
            <div class="detail-header">
                <h2 class="detail-title" id="detailTitle">Loading...</h2>
                <p class="detail-subtitle" id="detailSubtitle">-</p>
                <p class="detail-date" id="detailDate">-</p>
            </div>

            <div class="detail-content">
                <div class="album-intro" id="albumIntro">
                  Loading...
                </div>
            </div>
        </div>
    </div>
    <!-- 时间轴 -->
    <div class="timeline" id="timeline">
    </div>

    <!-- 加载动画 -->
    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p id="loading-text">Loading...</p>
    </div>

    <!-- 城市列表模态框 -->
    <div class="city-modal" id="cityModal">
        <div class="city-modal-content">
            <div class="city-modal-header">
                <button class="city-modal-close" id="closeCityModal">&times;</button>
                <h2 class="city-modal-title" id="city-modal-title">巡演城市</h2>
            </div>
            <div class="city-list" id="cityList">
            </div>
        </div>
    </div>

    <!-- 图片查看器模态框 -->
    <div class="modal" id="imageModal" role="dialog" aria-modal="true" aria-labelledby="modalCaption" aria-label="演唱会图片查看器">
        <button class="close" id="closeModal" aria-label="关闭图片查看器">&times;</button>
        <button class="modal-nav modal-prev" id="prevImage" aria-label="上一张图片">
            <i class="fas fa-chevron-left" aria-hidden="true"></i>
        </button>
        <button class="modal-nav modal-next" id="nextImage" aria-label="下一张图片">
            <i class="fas fa-chevron-right" aria-hidden="true"></i>
        </button>
        <img class="modal-content" id="modalImage" alt="演唱会图片">
        <div class="modal-caption" id="modalCaption" role="status" aria-live="polite"></div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-brand">
                <span class="footer-logo"></span>
                <span class="footer-divider"></span>
                <span class="footer-tagline" id="footer-text"></span>
            </div>
            <div class="footer-social">
                <a href="http://www.lyc.la" target="_blank" class="social-link" title="lyc.la">
                    <i class="fas fa-globe"></i>
                </a>
                <a href="http://github.com/layicr" target="_blank" class="social-link" title="Github">
                    <i class="fab fa-github"></i>
                </a>
                <a href="http://weibo.com/layicr" target="_blank" class="social-link" title="Weibo">
                    <i class="fab fa-weibo"></i>
                </a>
                <a href="https://mp.weixin.qq.com/s/S1sq45LC_iQuCLYxzoaRkw" target="_blank" class="social-link"
                    title="WeChat">
                    <i class="fab fa-weixin"></i>
                </a>
                <a href="https://v.douyin.com/5nAiAZQoUXw/" target="_blank" class="social-link" title="Douyin">
                    <i class="fab fa-tiktok"></i>
                </a>
                <a href="http://twitter.com/layicr" target="_blank" class="social-link" title="Twitter">
                    <i class="fab fa-twitter"></i>
                </a>
                <a href="http://www.instagram.com/ilayicr" target="_blank" class="social-link" title="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="http://www.facebook.com/layicr" target="_blank" class="social-link" title="Facebook">
                    <i class="fab fa-facebook"></i>
                </a>
            </div>
            <div class="footer-bottom">
                <span> <span id="site-name"></span></span>
                <span class="footer-separator"></span>
                <span></span>
            </div>
        </div>
    </footer>

    <button class="back-to-top" id="backToTop" title="返回顶部" aria-label="返回页面顶部">
        <i class="fas fa-arrow-up" aria-hidden="true"></i>
    </button>

    <script src="db/concerts_base.js"></script>
    <script src="db/datas_zh.js"></script>
    <script src="db/datas_en.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
