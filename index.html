<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="keywords"
        content="layicr,lyc,lyc.la,演唱会,五月天,陈奕迅,任贤齐,孙燕姿,邓紫棋,周传雄,李荣浩,伍佰,Concert,Mayday,EasonChan,RichieJen,StefanieSun,G.E.M.,SteveChou,LiRonghao,WuBai">
    <meta name="Description"
        content="layicr,lyc,lyc.la,演唱会,五月天,陈奕迅,任贤齐,孙燕姿,邓紫棋,周传雄,李荣浩,伍佰,Concert,Mayday,EasonChan,RichieJen,StefanieSun,G.E.M.,SteveChou,LiRonghao,WuBai">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>layicr</title>
    <link rel="stylesheet" type="text/css" href="css/main.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div class="language-switcher">
        <button class="lang-btn active" data-lang="zh">中文</button>
        <button class="lang-btn" data-lang="en">EN</button>
    </div>
    <div class="music-player">
        <button class="music-btn" id="musicToggle" title="Play/Pause music">
            <i class="fas fa-music" id="musicIcon"></i>
        </button>
        <span class="music-wave" id="musicWave">
            <span></span><span></span><span></span><span></span>
        </span>
    </div>
    <audio id="bgMusic" loop>
        <source id="bgMusicSource" src="music/bgm_cn.mp3" type="audio/mpeg">
    </audio>

    <div class="background-circles">
        <div class="logo-letter">L</div>
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <section class="hero-section">
        <div class="profile-wrapper">
            <div class="orbit-container">
                <div class="avatar-section">
                    <div class="avatar-container">
                        <img src="img/logo.jpg" alt="layicr" class="avatar-image" onerror="this.src='img/logo.jpg'">
                        <div class="status-dot"></div>
                    </div>
                    <div class="avatar-border"></div>
                </div>
            </div>

            <div class="profile-card">
                <div class="profile-label" id="profile-label">My name is:</div>
                <h1 class="profile-name">layicr</h1>

                <div class="profile-subtitle" id="profile-subtitle">XXX:</div>
                <ul class="roles-list" id="roles-list">
                    <li class="role-item">XX 演唱会</li>
                    <li class="role-item">XX 城市</li>
                </ul>
            </div>
        </div>
    </section>

    <!-- Stories Section -->
    <section class="section-spacing">
        <!-- 文字介绍区域 -->
        <div class="max-w-4xl mx-auto px-6 mb-16">
            <p class="text-2xl md:text-3xl text-gray-400 leading-relaxed max-w-3xl">
                <span id="dynamic-text-1"></span><br />
                <span id="dynamic-text-2"></span><br />
                <span id="dynamic-text" class="highlight-fill"></span>
            </p>
        </div>
    </section>

    <!-- Social Media Stats Section -->
    <section class="social-stats" id="influencer">

        <div class="stats-grid">
            <div class="stat-card cities" id="city-card">
                <div class="stat-number" id="total-cities">X</div>
                <div class="stat-label" id="cities-label">城市</div>
            </div>

            <div class="stat-card artists">
                <div class="stat-number" id="total-artists">X</div>
                <div class="stat-label" id="artists-label">艺人</div>
            </div>

            <div class="stat-card total">
                <div class="stat-number" id="total-concerts">X</div>
                <div class="stat-label" id="total-label">场次</div>
            </div>
        </div>
    </section>

    <!-- 时间轴 -->
    <div class="timeline" id="timeline">
    </div>

    <!-- 加载动画 -->
    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p id="loading-text">加载中...</p>
    </div>

    <!-- 城市列表模态框 -->
    <div class="city-modal" id="cityModal">
        <div class="city-modal-content">
            <div class="city-modal-header">
                <button class="city-modal-close" id="closeCityModal">&times;</button>
                <h2 class="city-modal-title" id="city-modal-title">巡演城市</h2>
            </div>
            <div class="city-list" id="cityList">
            </div>
        </div>
    </div>

    <!-- 图片查看器模态框 -->
    <div class="modal" id="imageModal">
        <span class="close" id="closeModal">&times;</span>
        <button class="modal-nav modal-prev" id="prevImage">
            <i class="fas fa-chevron-left"></i>
        </button>
        <button class="modal-nav modal-next" id="nextImage">
            <i class="fas fa-chevron-right"></i>
        </button>
        <img class="modal-content" id="modalImage" alt="演唱会图片">
        <div class="modal-caption" id="modalCaption"></div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-brand">
                <span class="footer-logo"></span>
                <span class="footer-divider"></span>
                <span class="footer-tagline" id="footer-text"></span>
            </div>
            <div class="footer-social">
                <a href="http://www.lyc.la" target="_blank" class="social-link" title="lyc.la">
                    <i class="fas fa-globe"></i>
                </a>
                <a href="http://github.com/layicr" target="_blank" class="social-link" title="Github">
                    <i class="fab fa-github"></i>
                </a>
                <a href="http://weibo.com/layicr" target="_blank" class="social-link" title="Weibo">
                    <i class="fab fa-weibo"></i>
                </a>
                <a href="https://mp.weixin.qq.com/s/S1sq45LC_iQuCLYxzoaRkw" target="_blank" class="social-link"
                    title="WeChat">
                    <i class="fab fa-weixin"></i>
                </a>
                <a href="https://v.douyin.com/5nAiAZQoUXw/" target="_blank" class="social-link" title="Douyin">
                    <i class="fab fa-tiktok"></i>
                </a>
                <a href="http://twitter.com/layicr" target="_blank" class="social-link" title="Twitter">
                    <i class="fab fa-twitter"></i>
                </a>
                <a href="http://www.instagram.com/ilayicr" target="_blank" class="social-link" title="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="http://www.facebook.com/layicr" target="_blank" class="social-link" title="Facebook">
                    <i class="fab fa-facebook"></i>
                </a>
            </div>
            <div class="footer-bottom">
                <span> <span id="site-name"></span></span>
                <span class="footer-separator">·</span>
                <span><a href="https://www.busuanzi.cc/count.php?search=www.busuanzi.cc" title="" target="_blank">
                    </a></span>
            </div>
        </div>
    </footer>

    <button class="back-to-top" id="backToTop" title="Back">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script src="db/datas_cn.js"></script>
    <script src="db/datas_en.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
